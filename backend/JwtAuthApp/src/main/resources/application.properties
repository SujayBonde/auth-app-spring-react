spring.application.name=JwtAuthApp

# ==============================
# Server Config
# ==============================
server.port=8080

# ==============================
# MySQL Database Config
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/jwt_auth_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Sujay@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate Config
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT Config
# ==============================
# IMPORTANT: Change this secret to a strong random string in production!
app.jwt.secret=MyVerySecretKeyThatShouldBeAtLeast256BitsLongForHS256Algorithm!
app.jwt.expiration-ms=86400000
# 86400000 ms = 24 hours

# ==============================
# CORS Config (handled in code too)
# ==============================
app.cors.allowed-origins=http://localhost:3000